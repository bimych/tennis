name: Check tennis availability

env:
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check_tennis_availability:
    name: Check tennis class and court availability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setting up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check coaching availability
        run: python check_coaching_availability.py

      - name: Check court availability
        run: python check_court_availability.py

      - name: Commit state changes
        run: |
          git add -A
          git diff --cached --exit-code || git commit -m "Update availability state [skip ci]"
          git push || true
